<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Housing Price Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container py-5">

    <!-- Header -->
    <div class="card shadow-lg mb-4">
        <div class="card-body text-center">

            <h1 class="display-5 fw-bold">
                California Housing Price Prediction
            </h1>

            <p class="text-muted mb-0">
                Predict Median House Values using Linear Regression
            </p>

        </div>
    </div>

    <!-- Prediction Form -->

    <div class="card shadow">

        <div class="card-body">

            <form action="/predict" method="POST">

                <div class="row">

                    <!-- Median Income -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Median Income</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="MedInc"
                               placeholder="e.g. 8.32"
                               required>
                    </div>

                    <!-- House Age -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">House Age</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="HouseAge"
                               placeholder="e.g. 41"
                               required>
                    </div>

                    <!-- Average Rooms -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Average Rooms</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="AveRooms"
                               placeholder="e.g. 6.98"
                               required>
                    </div>

                    <!-- Average Bedrooms -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Average Bedrooms</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="AveBedrms"
                               placeholder="e.g. 1.02"
                               required>
                    </div>

                    <!-- Population -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Population</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="Population"
                               placeholder="e.g. 322"
                               required>
                    </div>

                    <!-- Average Occupancy -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Average Occupancy</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="AveOccup"
                               placeholder="e.g. 2.55"
                               required>
                    </div>

                    <!-- Latitude -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Latitude</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="Latitude"
                               placeholder="e.g. 37.88"
                               required>
                    </div>

                    <!-- Longitude -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Longitude</label>
                        <input type="number"
                               step="any"
                               class="form-control"
                               name="Longitude"
                               placeholder="e.g. -122.23"
                               required>
                    </div>

                </div>

                <div class="text-center mt-4">

                    <button type="submit"
                            class="btn btn-primary btn-lg px-5">

                        Predict House Price

                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Prediction -->

    {% if prediction %}

    <div class="card shadow-lg mt-5">

        <div class="card-body text-center">

            <h3 class="mb-3">
                Estimated House Value
            </h3>

            <h1 class="display-4 text-success fw-bold">
                {{ prediction }}
            </h1>

            <hr>

            <div class="row">

                <div class="col-md-4">
                    <h6>Model</h6>
                    <p class="text-muted">
                        {{ model_name }}
                    </p>
                </div>

                <div class="col-md-4">
                    <h6>R² Score</h6>
                    <p class="text-muted">
                        {{ metrics.R2 }}
                    </p>
                </div>

                <div class="col-md-4">
                    <h6>MAE</h6>
                    <p class="text-muted">
                        ${{ "{:,.0f}".format(metrics.MAE * 100000) }}
                    </p>
                </div>

            </div>

        </div>

    </div>

    {% endif %}

</div>

</body>

</html>
